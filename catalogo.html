<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho - NOEL SERVIÇOS DIGITAIS</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header class="topo">

    <a href="index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <img src="img/logo.png" alt="NOEL Serviços Digitais">

    <h1>Meu Carrinho</h1>

</header>

<main class="carrinho-container">

    <section id="listaCarrinho">

        <!-- Itens adicionados aparecerão aqui -->

    </section>

    <section class="resumo">

        <div class="linha">
            <span>Itens</span>
            <span id="quantidadeItens">0</span>
        </div>

        <div class="linha total">
            <span>Total</span>
            <strong id="valorTotal">R$ 0,00</strong>
        </div>

        <button id="limparCarrinho" class="btn-secundario">
            <i class="fa-solid fa-trash"></i>
            Limpar Carrinho
        </button>

        <button id="pedido" class="btn-principal">
            <i class="fa-brands fa-whatsapp"></i>
            Finalizar pelo WhatsApp
        </button>

    </section>

</main>

<footer>

    <p>
        © 2026 NOEL SERVIÇOS DIGITAIS
    </p>

</footer>

<script src="js/carrinho.js"></script>

</body>

</html>
